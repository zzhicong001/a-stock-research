<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股研报 & 投资分析 | Research Hub</title>
<style>
  :root {
    --bg: #0f1117;
    --card-bg: #1a1d28;
    --text: #e4e6eb;
    --text-secondary: #9ca3af;
    --accent: #f59e0b;
    --accent-dim: #d97706;
    --border: #2d3148;
    --tag-bg: #1e293b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .container { max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; }
  
  header {
    text-align: center;
    padding: 60px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }
  header h1 {
    font-size: 2.2em;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #f59e0b, #fbbf24);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header .subtitle {
    color: var(--text-secondary);
    font-size: 0.95em;
  }
  header .disclaimer {
    display: inline-block;
    margin-top: 16px;
    padding: 6px 16px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 20px;
    font-size: 0.8em;
    color: #ef4444;
  }
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin: 20px 0 0;
    font-size: 0.85em;
    color: var(--text-secondary);
  }
  .stats-bar span strong { color: var(--accent); }

  /* 筛选标签栏 */
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }
  .filter-tag {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 0.82em;
    transition: all 0.2s;
    user-select: none;
  }
  .filter-tag:hover { border-color: var(--accent-dim); color: var(--text); }
  .filter-tag.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  .doc-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
    transition: border-color 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .doc-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .doc-card h3 {
    font-size: 1.1em;
    margin-bottom: 6px;
  }
  .doc-card h3 a {
    color: var(--text);
    text-decoration: none;
  }
  .doc-card h3 a:hover { color: var(--accent); }
  .doc-card .meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    font-size: 0.82em;
    color: var(--text-secondary);
  }
  .doc-card .meta .tag {
    display: inline-block;
    padding: 2px 10px;
    background: var(--tag-bg);
    border-radius: 10px;
    font-size: 0.9em;
  }
  .doc-card .meta .html-tag { color: #60a5fa; }
  .doc-card .meta .md-tag { color: #10b981; }
  .doc-card .meta .text-tag { color: #a78bfa; }

  .loading, .empty {
    text-align: center;
    padding: 40px;
    color: var(--text-secondary);
  }

  footer {
    text-align: center;
    padding: 30px 0;
    color: var(--text-secondary);
    font-size: 0.8em;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }
  footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 600px) {
    header h1 { font-size: 1.5em; }
    .container { padding: 20px 16px 60px; }
    .doc-card { padding: 16px; }
  }
</style>
</head>
<body>
<div class="container">

<header>
  <h1>A股研报 & 投资分析</h1>
  <p class="subtitle">AI 算力 · 数据中心 · 产业链深度研究</p>
  <span class="disclaimer">⚠ 研究参考，不构成投资建议</span>
  <div class="stats-bar" id="stats"></div>
</header>

<nav class="filter-bar" id="filter-bar">
  <span class="filter-tag active" data-tag="all">全部</span>
</nav>

<main id="doc-list">
  <div class="loading">📂 加载中...</div>
</main>

<footer>
  Powered by <a href="https://pages.cloudflare.com" target="_blank">Cloudflare Pages</a> · 
  <a href="https://github.com" target="_blank">View on GitHub</a>
</footer>

</div>

<script>
(async function() {
  const list = document.getElementById('doc-list');
  const filterBar = document.getElementById('filter-bar');
  const statsEl = document.getElementById('stats');
  
  let allDocs = [];
  let activeTag = 'all';

  // 加载 files.json
  try {
    const res = await fetch('files.json');
    allDocs = await res.json();
  } catch(e) {
    list.innerHTML = '<div class="empty">⚠ 无法加载文件清单，请确保 files.json 存在</div>';
    return;
  }

  if (!allDocs.length) {
    list.innerHTML = '<div class="empty">📭 暂无文档</div>';
    return;
  }

  // 统计
  const totalFiles = allDocs.reduce((sum, d) => sum + d.files.length, 0);
  statsEl.innerHTML = `<span>📄 <strong>${allDocs.length}</strong> 篇报告</span><span>📁 <strong>${totalFiles}</strong> 个文件</span>`;

  // 收集所有标签
  const tagCounts = {};
  allDocs.forEach(doc => {
    doc.tags.forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; });
  });

  // 渲染筛选栏
  const sortedTags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]);
  sortedTags.forEach(([tag, count]) => {
    const el = document.createElement('span');
    el.className = 'filter-tag';
    el.dataset.tag = tag;
    el.textContent = `${tag} (${count})`;
    el.addEventListener('click', () => {
      filterBar.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      activeTag = tag;
      render();
    });
    filterBar.appendChild(el);
  });

  // 全部按钮
  filterBar.querySelector('[data-tag="all"]').addEventListener('click', function() {
    filterBar.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    activeTag = 'all';
    render();
  });

  function render() {
    const filtered = activeTag === 'all' 
      ? allDocs 
      : allDocs.filter(d => d.tags.includes(activeTag));

    if (!filtered.length) {
      list.innerHTML = '<div class="empty">📭 该标签下暂无文档</div>';
      return;
    }

    list.innerHTML = filtered.map(doc => {
      const primary = doc.files[0];
      const fileLinks = doc.files.map(f => {
        const cls = f.type === 'html' ? 'html-tag' : f.type === 'md' ? 'md-tag' : 'text-tag';
        return `<a href="${f.href}" class="tag ${cls}" onclick="event.stopPropagation()">${f.name}</a>`;
      }).join(' ');

      const tags = doc.tags.map(t => `<span class="tag">${t}</span>`).join(' ');

      return `
      <div class="doc-card" onclick="location.href='${primary.href}'">
        <h3><a href="${primary.href}">${doc.title}</a></h3>
        <p style="color:var(--text-secondary);font-size:0.88em;margin:8px 0 12px;">${doc.desc}</p>
        <div class="meta">
          <span>📅 ${doc.date}</span>
          ${tags}
          <span style="margin-left:auto">${fileLinks}</span>
        </div>
      </div>`;
    }).join('');
  }

  render();
})();
</script>

</body>
</html>
