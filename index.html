<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股研报 & 投资分析</title>
<style>
  :root {
    --bg: #0f1117;
    --sidebar-bg: #131620;
    --card-bg: #1a1d28;
    --text: #e4e6eb;
    --text-secondary: #9ca3af;
    --accent: #f59e0b;
    --accent-dim: #d97706;
    --border: #2d3148;
    --tag-bg: #1e293b;
    --sidebar-width: 300px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
    height: 100vh; overflow: hidden; display: flex;
  }

  /* ---- Sidebar ---- */
  .sidebar {
    width: var(--sidebar-width); min-width: var(--sidebar-width);
    background: var(--sidebar-bg); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    z-index: 10;
  }
  .sidebar-header {
    padding: 20px 18px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .sidebar-header h2 {
    font-size: 1.1em; font-weight: 700; margin-bottom: 4px;
    background: linear-gradient(135deg, #f59e0b, #fbbf24);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .sidebar-header .sub { font-size: 0.78em; color: var(--text-secondary); }
  .sidebar-header .disclaimer {
    display: inline-block; margin-top: 8px; padding: 3px 10px;
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
    border-radius: 12px; font-size: 0.7em; color: #ef4444;
  }

  .sidebar-search {
    padding: 12px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; position: relative;
  }
  .sidebar-search input {
    width: 100%; padding: 8px 14px 8px 34px;
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px;
    color: var(--text); font-size: 0.85em; outline: none; transition: border-color 0.2s;
  }
  .sidebar-search input:focus { border-color: var(--accent); }
  .sidebar-search input::placeholder { color: var(--text-secondary); }
  .sidebar-search svg {
    position: absolute; left: 25px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; opacity: 0.4; pointer-events: none;
  }
  .search-result-count {
    text-align: center; font-size: 0.75em; color: var(--text-secondary);
    padding: 4px 0; border-bottom: 1px solid var(--border); flex-shrink: 0; display: none;
  }
  .search-result-count.visible { display: block; }

  .sidebar-tree {
    flex: 1; overflow-y: auto; padding: 8px 0;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .sidebar-tree::-webkit-scrollbar { width: 5px; }
  .sidebar-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .sidebar-footer {
    padding: 10px 14px; border-top: 1px solid var(--border); flex-shrink: 0;
    font-size: 0.72em; color: var(--text-secondary); text-align: center;
  }
  .sidebar-footer a { color: var(--accent); text-decoration: none; }

  /* ---- Tree Nodes ---- */
  .tree-node { user-select: none; }
  .tree-row {
    display: flex; align-items: center; gap: 4px; padding: 4px 12px;
    cursor: pointer; transition: background 0.12s; min-height: 32px;
    text-decoration: none; color: var(--text); font-size: 0.85em;
  }
  .tree-row:hover { background: var(--tag-bg); }
  .tree-row:active { background: rgba(245,158,11,0.1); }

  .tree-arrow {
    width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
    font-size: 0.65em; color: var(--text-secondary); flex-shrink: 0;
    transition: transform 0.15s;
  }
  .tree-folder.open > .tree-row .tree-arrow { transform: rotate(90deg); }
  .tree-arrow.empty { visibility: hidden; }

  .tree-icon { flex-shrink: 0; font-size: 1em; width: 20px; text-align: center; }
  .tree-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tree-badge {
    font-size: 0.8em; color: var(--text-secondary); flex-shrink: 0; margin-left: 4px;
  }
  .tree-file-tags {
    display: flex; gap: 3px; flex-shrink: 0; margin-left: 4px;
  }
  .tree-file-tags .mini-tag {
    padding: 1px 6px; background: var(--tag-bg); border-radius: 6px;
    font-size: 0.7em; color: var(--text-secondary);
  }
  .mini-tag.html { color: #60a5fa; }
  .mini-tag.md { color: #10b981; }

  .tree-children { display: none; }
  .tree-folder.open > .tree-children { display: block; }

  .tree-row.active { background: rgba(245,158,11,0.12); border-left: 2px solid var(--accent); padding-left: 10px; }
  .tree-row.hidden { display: none; }

  .highlight { background: rgba(245,158,11,0.3); border-radius: 2px; padding: 0 2px; }

  /* ---- Main Content ---- */
  .main {
    flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }
  .main-header {
    padding: 14px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; gap: 12px;
  }
  .main-header .doc-title { font-size: 1.1em; font-weight: 700; flex: 1; }
  .main-header .doc-meta { font-size: 0.82em; color: var(--text-secondary); }
  .main-header .doc-actions { display: flex; gap: 8px; }
  .main-header .doc-actions a {
    padding: 4px 12px; border: 1px solid var(--border); border-radius: 14px;
    font-size: 0.78em; color: var(--text-secondary); text-decoration: none;
    transition: all 0.2s;
  }
  .main-header .doc-actions a:hover { border-color: var(--accent); color: var(--accent); }

  .main-body {
    flex: 1; overflow-y: auto; padding: 0 24px 40px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .main-body::-webkit-scrollbar { width: 5px; }
  .main-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .welcome {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; text-align: center; color: var(--text-secondary);
  }
  .welcome h2 { font-size: 1.4em; margin-bottom: 8px; color: var(--text); }
  .welcome p { font-size: 0.9em; max-width: 400px; }
  .welcome .stats { margin-top: 20px; font-size: 0.85em; display: flex; gap: 24px; }
  .welcome .stats strong { color: var(--accent); }

  /* ---- MD Content ---- */
  .md-content { line-height: 1.85; max-width: 820px; margin: 0 auto; padding-top: 20px; }
  .md-content h1 { font-size: 1.8em; font-weight: 700; margin: 32px 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .md-content h2 { font-size: 1.4em; font-weight: 700; margin: 28px 0 12px; }
  .md-content h3 { font-size: 1.15em; font-weight: 600; margin: 24px 0 10px; color: var(--accent); }
  .md-content h4 { font-size: 1em; font-weight: 600; margin: 20px 0 8px; }
  .md-content p { margin: 10px 0; }
  .md-content a { color: var(--accent); }
  .md-content blockquote {
    border-left: 3px solid var(--accent); padding: 10px 18px; margin: 16px 0;
    background: rgba(245,158,11,0.05); border-radius: 0 8px 8px 0; color: var(--text-secondary);
  }
  .md-content code {
    background: var(--tag-bg); padding: 2px 6px; border-radius: 4px;
    font-family: "SF Mono","Fira Code","Consolas",monospace; font-size: 0.9em;
  }
  .md-content pre {
    background: var(--tag-bg); padding: 16px 20px; border-radius: 8px; overflow-x: auto;
    margin: 16px 0; border: 1px solid var(--border);
  }
  .md-content pre code { background: none; padding: 0; font-size: 0.85em; }
  .md-content table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.9em; }
  .md-content th, .md-content td { border: 1px solid var(--border); padding: 10px 14px; text-align: left; }
  .md-content th { background: var(--tag-bg); font-weight: 600; color: var(--accent); }
  .md-content td { background: var(--card-bg); }
  .md-content ul, .md-content ol { padding-left: 24px; margin: 8px 0; }
  .md-content li { margin: 4px 0; }
  .md-content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  .md-content strong { font-weight: 700; }
  .md-content img { max-width: 100%; border-radius: 8px; }
  .md-content em { color: var(--text-secondary); }

  .main-body .loading { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
  .main-body .error { text-align: center; padding: 60px 20px; color: #ef4444; }

  /* ---- Mobile ---- */
  .menu-btn {
    display: none; position: fixed; top: 12px; left: 12px; z-index: 20;
    width: 36px; height: 36px; align-items: center; justify-content: center;
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); cursor: pointer; font-size: 1.2em;
  }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9; }
  @media (max-width: 768px) {
    .menu-btn { display: flex; }
    .sidebar { position: fixed; left: -100%; top: 0; bottom: 0; transition: left 0.25s; width: 280px; min-width: 280px; }
    .sidebar.open { left: 0; }
    .overlay.open { display: block; }
    .main-header { padding: 14px 16px 14px 52px; }
    .main-body { padding: 0 12px 30px; }
    .main-body .md-content { padding-top: 10px; }
    .md-content table { display: block; overflow-x: auto; }
  }
</style>
</head>
<body>

<button class="menu-btn" id="menu-btn" onclick="toggleSidebar()" title="目录">☰</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar open" id="sidebar">
  <div class="sidebar-header">
    <h2>A股研报</h2>
    <p class="sub">AI 算力 · 数据中心 · 产业链研究</p>
    <span class="disclaimer">⚠ 研究参考，不构成投资建议</span>
  </div>
  <div class="sidebar-search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="搜索…" autocomplete="off">
  </div>
  <div class="search-result-count" id="search-count"></div>
  <nav class="sidebar-tree" id="sidebar-tree">
    <div style="padding:20px;text-align:center;color:var(--text-secondary);">📂 加载中...</div>
  </nav>
  <div class="sidebar-footer">
    <a href="https://github.com/zzhicong001/a-stock-research" target="_blank">GitHub</a>
  </div>
</aside>

<!-- Main -->
<main class="main">
  <div class="main-header" id="main-header">
    <span class="doc-title" id="main-title">欢迎</span>
    <span class="doc-meta" id="main-meta"></span>
    <span class="doc-actions" id="main-actions"></span>
  </div>
  <div class="main-body" id="main-body">
    <div class="welcome" id="welcome">
      <h2>A股研报 & 投资分析</h2>
      <p>左侧目录树选择文档进行阅读。<br>支持 MD 渲染与 HTML 直接浏览。</p>
      <div class="stats" id="stats"></div>
    </div>
    <div class="md-content" id="md-content" style="display:none"></div>
    <div class="loading" id="main-loading" style="display:none">📖 加载中...</div>
    <div class="error" id="main-error" style="display:none"></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function() {
  const tree = document.getElementById('sidebar-tree');
  const searchInput = document.getElementById('search-input');
  const searchCount = document.getElementById('search-count');
  const mainTitle = document.getElementById('main-title');
  const mainMeta = document.getElementById('main-meta');
  const mainActions = document.getElementById('main-actions');
  const mainBody = document.getElementById('main-body');
  const welcome = document.getElementById('welcome');
  const mdContent = document.getElementById('md-content');
  const mainLoading = document.getElementById('main-loading');
  const mainError = document.getElementById('main-error');
  const statsEl = document.getElementById('stats');

  let allDocs = [];
  let activeHref = null;
  let searchQuery = '';

  // 模糊匹配
  function fuzzyMatch(text, query) {
    if (!query) return true;
    const t = text.toLowerCase(), q = query.toLowerCase();
    let qi = 0;
    for (let i = 0; i < t.length && qi < q.length; i++) {
      if (t[i] === q[qi]) qi++;
    }
    return qi === q.length;
  }

  function docMatchText(doc) {
    return doc.title + ' ' + doc.desc + ' ' + doc.tags.join(' ') + ' ' +
      doc.files.map(f => f.href).join(' ');
  }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function hl(text) {
    if (!searchQuery || !text) return esc(text);
    const q = searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return esc(text).replace(new RegExp(`(${q})`, 'gi'), '<span class="highlight">$1</span>');
  }

  // 年月日
  const MONTHS = ['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  function parseDateFolder(href) {
    const m = href.match(/docs\/(\d{4})-(\d{2})-(\d{2})\//);
    if (m) return { year: m[1], month: m[2], day: m[3] };
    return { year: '其他', month: '', day: '' };
  }

  // 构建树数据
  function buildTreeData(docs) {
    const tree = {};
    docs.forEach(doc => {
      const f = doc.files[0];
      const date = parseDateFolder(f.href);
      if (!tree[date.year]) tree[date.year] = {};
      if (!tree[date.year][date.month]) tree[date.year][date.month] = {};
      if (!tree[date.year][date.month][date.day]) tree[date.year][date.month][date.day] = [];
      tree[date.year][date.month][date.day].push(doc);
    });
    return tree;
  }

  function countDocs(node) {
    let count = 0;
    if (Array.isArray(node)) return node.length;
    for (const key in node) count += countDocs(node[key]);
    return count;
  }

  // 判断节点是否匹配搜索
  function nodeMatchesSearch(node) {
    if (Array.isArray(node)) {
      return node.some(d => fuzzyMatch(docMatchText(d), searchQuery));
    }
    for (const key in node) {
      if (nodeMatchesSearch(node[key])) return true;
    }
    return false;
  }

  function renderTree(data) {
    if (!allDocs.length) {
      tree.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-secondary);">📭 暂无文档</div>';
      return;
    }

    const sortedYears = Object.keys(data).sort().reverse();
    let html = '';

    sortedYears.forEach(year => {
      const yearData = data[year];
      if (searchQuery && !nodeMatchesSearch(yearData)) return;

      const yearCount = countDocs(yearData);
      const yearId = 'y' + year;
      const hasMonths = Object.keys(yearData).length > 0;

      html += `<div class="tree-node tree-folder open" data-year="${year}">`;
      html += `<div class="tree-row" onclick="toggleFolder(this.parentElement, event)" data-id="${yearId}">`;
      html += `<span class="tree-arrow">▶</span>`;
      html += `<span class="tree-icon">📁</span>`;
      html += `<span class="tree-label">${year}年</span>`;
      html += `<span class="tree-badge">${yearCount}篇</span>`;
      html += `</div>`;
      html += `<div class="tree-children">`;

      const sortedMonths = Object.keys(yearData).sort((a,b) => parseInt(b)-parseInt(a));
      sortedMonths.forEach(month => {
        const monthData = yearData[month];
        if (searchQuery && !nodeMatchesSearch(monthData)) return;

        const monthCount = countDocs(monthData);
        const monthId = `m${year}${month}`;
        const monthLabel = MONTHS[parseInt(month)] || month;

        html += `<div class="tree-node tree-folder open" data-month="${month}">`;
        html += `<div class="tree-row" onclick="toggleFolder(this.parentElement, event)" data-id="${monthId}">`;
        html += `<span class="tree-arrow">▶</span>`;
        html += `<span class="tree-icon">📂</span>`;
        html += `<span class="tree-label">${monthLabel}</span>`;
        html += `<span class="tree-badge">${monthCount}篇</span>`;
        html += `</div>`;
        html += `<div class="tree-children">`;

        const sortedDays = Object.keys(monthData).sort((a,b) => parseInt(b)-parseInt(a));
        sortedDays.forEach(day => {
          const dayDocs = monthData[day];
          if (searchQuery) {
            const matching = dayDocs.filter(d => fuzzyMatch(docMatchText(d), searchQuery));
            if (!matching.length) return;
          }

          const dayId = `d${year}${month}${day}`;
          html += `<div class="tree-node tree-folder open" data-day="${day}">`;
          html += `<div class="tree-row" onclick="toggleFolder(this.parentElement, event)" data-id="${dayId}">`;
          html += `<span class="tree-arrow">▶</span>`;
          html += `<span class="tree-icon">📅</span>`;
          html += `<span class="tree-label">${parseInt(day)}日</span>`;
          html += `<span class="tree-badge">${dayDocs.length}篇</span>`;
          html += `</div>`;
          html += `<div class="tree-children">`;

          const shownDocs = searchQuery
            ? dayDocs.filter(d => fuzzyMatch(docMatchText(d), searchQuery))
            : dayDocs;
          shownDocs.forEach(doc => {
            const primary = doc.files[0];
            const fTags = doc.files.filter(f => f.type === 'md').map(f =>
              `<span class="mini-tag md">${f.name}</span>`
            ).join('');
            const href = primary.href;
            const isMd = primary.type === 'md';
            const fileId = 'f' + href;
            html += `<div class="tree-node tree-file" data-href="${href}">`;
            html += `<a href="${href}" class="tree-row" data-id="${fileId}"
              onclick="selectFile(event, '${esc(href)}', '${esc(doc.title)}', '${doc.date}', ${isMd})">`;
            html += `<span class="tree-arrow empty">▶</span>`;
            html += `<span class="tree-icon">📄</span>`;
            html += `<span class="tree-label">${hl(doc.title)}</span>`;
            html += `<span class="tree-file-tags">${fTags}</span>`;
            html += `</a></div>`;
          });
          html += `</div></div>`;
        });
        html += `</div></div>`;
      });
      html += `</div></div>`;
    });

    tree.innerHTML = html;

    // 更新选中状态
    if (activeHref) {
      const activeEl = tree.querySelector(`[data-href="${activeHref}"]`);
      if (activeEl) {
        const row = activeEl.querySelector('.tree-row');
        if (row) row.classList.add('active');
      }
    }
  }

  window.toggleFolder = function(el, event) {
    event.stopPropagation();
    el.classList.toggle('open');
  };

  window.selectFile = function(event, href, title, date, isMd) {
    event.preventDefault();
    activeHref = href;
    mainTitle.textContent = title;
    mainMeta.textContent = '📅 ' + date;

    // 高亮当前选中
    tree.querySelectorAll('.tree-row.active').forEach(r => r.classList.remove('active'));
    const row = event.target.closest('.tree-row');
    if (row) row.classList.add('active');

    if (isMd) {
      loadMd(href, title, date);
    } else {
      // HTML 文件用 iframe
      welcome.style.display = 'none';
      mdContent.style.display = 'block';
      mainLoading.style.display = 'none';
      mainError.style.display = 'none';
      mdContent.innerHTML = `<div style="text-align:center;padding:40px;">
        <p style="margin-bottom:16px;">这是一个 HTML 文档，在新窗口查看效果最佳</p>
        <a href="${href}" target="_blank" style="color:var(--accent);font-size:1.1em;">📄 打开: ${title}</a>
        <p style="margin-top:16px;color:var(--text-secondary);font-size:0.85em;">
          或 <a href="${href}" style="color:var(--accent);">在新标签页中打开原始文件</a>
        </p>
        <iframe src="${href}" style="width:100%;height:70vh;border:1px solid var(--border);border-radius:8px;margin-top:16px;"
          sandbox="allow-scripts allow-same-origin"></iframe>
      </div>`;
    }

    mainActions.innerHTML = `<a href="${href}" target="_blank">打开原始文件</a>`;

    // 移动端关闭侧边栏
    if (window.innerWidth <= 768) closeSidebar();

    // 滚动到顶部
    mainBody.scrollTop = 0;
  };

  function loadMd(href, title, date) {
    welcome.style.display = 'none';
    mdContent.style.display = 'block';
    mainLoading.style.display = 'block';
    mainError.style.display = 'none';
    mdContent.innerHTML = '';
    mainBody.scrollTop = 0;

    fetch(href)
      .then(r => { if (!r.ok) throw new Error('404'); return r.text(); })
      .then(md => {
        mainLoading.style.display = 'none';
        mdContent.innerHTML = marked.parse(md);
      })
      .catch(err => {
        mainLoading.style.display = 'none';
        mainError.style.display = 'block';
        mainError.innerHTML = `⚠ 加载失败: <a href="${href}" target="_blank" style="color:var(--accent);">直接打开</a>`;
      });
  }

  // 搜索
  let searchTimer;
  searchInput.addEventListener('input', function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = this.value.trim();
      searchCount.classList.toggle('visible', searchQuery.length > 0);
      const data = buildTreeData(allDocs);
      if (searchQuery) {
        const totalMatch = allDocs.filter(d => fuzzyMatch(docMatchText(d), searchQuery)).length;
        searchCount.textContent = `找到 ${totalMatch} 篇`;
      }
      renderTree(data);
    }, 150);
  });

  // 移动端
  window.toggleSidebar = function() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('open');
  };
  window.closeSidebar = function() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  };

  // 初始化
  fetch('files.json')
    .then(r => r.json())
    .then(docs => {
      allDocs = docs;
      const total = docs.reduce((s, d) => s + d.files.length, 0);
      statsEl.innerHTML = `<strong>${docs.length}</strong> 篇报告 · <strong>${total}</strong> 个文件`;
      const data = buildTreeData(docs);
      renderTree(data);
    })
    .catch(() => {
      tree.innerHTML = '<div style="padding:20px;text-align:center;color:#ef4444;">⚠ 加载失败</div>';
    });

})();
</script>

</body>
</html>
