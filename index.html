<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股研报 & 投资分析 | Research Hub</title>
<style>
  :root {
    --bg: #0f1117;
    --card-bg: #1a1d28;
    --text: #e4e6eb;
    --text-secondary: #9ca3af;
    --accent: #f59e0b;
    --accent-dim: #d97706;
    --border: #2d3148;
    --green: #10b981;
    --red: #ef4444;
    --tag-bg: #1e293b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .container { max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; }
  
  header {
    text-align: center;
    padding: 60px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }
  header h1 {
    font-size: 2.2em;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #f59e0b, #fbbf24);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header .subtitle {
    color: var(--text-secondary);
    font-size: 0.95em;
  }
  header .disclaimer {
    display: inline-block;
    margin-top: 16px;
    padding: 6px 16px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 20px;
    font-size: 0.8em;
    color: var(--red);
  }

  .doc-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
    transition: border-color 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .doc-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .doc-card h3 {
    font-size: 1.1em;
    margin-bottom: 6px;
  }
  .doc-card h3 a {
    color: var(--text);
    text-decoration: none;
  }
  .doc-card h3 a:hover { color: var(--accent); }
  .doc-card .meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 0.82em;
    color: var(--text-secondary);
  }
  .doc-card .meta .tag {
    display: inline-block;
    padding: 2px 10px;
    background: var(--tag-bg);
    border-radius: 10px;
    font-size: 0.9em;
  }
  .doc-card .meta .tag.html { color: #60a5fa; }
  .doc-card .meta .tag.md { color: var(--green); }

  footer {
    text-align: center;
    padding: 30px 0;
    color: var(--text-secondary);
    font-size: 0.8em;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }
  footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 600px) {
    header h1 { font-size: 1.5em; }
    .container { padding: 20px 16px 60px; }
    .doc-card { padding: 16px; }
  }
</style>
</head>
<body>
<div class="container">

<header>
  <h1>A股研报 & 投资分析</h1>
  <p class="subtitle">AI 算力 · 数据中心 · 产业链深度研究</p>
  <span class="disclaimer">⚠ 研究参考，不构成投资建议</span>
</header>

<main id="doc-list">
</main>

<footer>
  Powered by <a href="https://pages.cloudflare.com" target="_blank">Cloudflare Pages</a> · 
  <a href="https://github.com" target="_blank">View on GitHub</a>
</footer>

</div>

<script>
// 文档列表 —— 更新时只需改这里
const docs = [
  {
    title: "戴尔产业链 — A股受益标的深度梳理",
    date: "2026-05-29",
    desc: "戴尔FY2027 Q1财报全面超预期，AI服务器营收同比+757%，梳理A股核心受益标的",
    tags: ["AI服务器", "算力", "戴尔产业链"],
    files: [
      { name: "Markdown 版", href: "戴尔产业链_A股受益标的_2026-05-29.md", type: "md" },
      { name: "网页版", href: "戴尔产业链_A股受益标的_2026-05-29.html", type: "html" }
    ]
  },
  {
    title: "Anthropic — A股直接受益标的",
    date: "2026-05-29",
    desc: "Anthropic万亿估值下，Google TPU/AWS Trainium生态链如何映射A股光模块、PCB、服务器代工",
    tags: ["Anthropic", "光模块", "PCB", "算力"],
    files: [
      { name: "Markdown 版", href: "Anthropic_A股受益标的_2026-05-29.md", type: "md" },
      { name: "网页版", href: "Anthropic_A股受益标的_2026-05-29.html", type: "html" }
    ]
  },
  {
    title: "2026年5月29日 卖方研究报告汇总",
    date: "2026-05-29",
    desc: "银河/中信/中信建投/招商等头部券商晨会观点汇总，覆盖AI、金融、消费等方向",
    tags: ["券商晨会", "卖方研报", "策略"],
    files: [
      { name: "Markdown 版", href: "卖方报告_2026-05-29.md", type: "md" }
    ]
  },
  {
    title: "戴尔概念股 — 李朋整理",
    date: "2026-05-29",
    desc: "戴尔AI服务器概念股个股梳理，含产业链各环节核心公司",

    ]

  {

    tags: ["特朗普", "持仓分析", "美股"],
    files: [

  {

    files: [

    ]
  }
];

const list = document.getElementById('doc-list');
docs.forEach(doc => {
  const card = document.createElement('div');
  card.className = 'doc-card';
  card.onclick = () => { if(doc.files[0]) location.href = doc.files[0].href; };
  
  const links = doc.files.map(f => 
    `<a href="${f.href}" class="tag ${f.type}" onclick="event.stopPropagation()">${f.name}</a>`
  ).join(' ');
  
  const tags = doc.tags.map(t => `<span class="tag">${t}</span>`).join(' ');
  
  card.innerHTML = `
    <h3><a href="${doc.files[0].href}">${doc.title}</a></h3>
    <p style="color:var(--text-secondary);font-size:0.88em;margin:8px 0 12px;">${doc.desc}</p>
    <div class="meta">
      <span>📅 ${doc.date}</span>
      ${tags}
      <span style="margin-left:auto">${links}</span>
    </div>
  `;
  list.appendChild(card);
});
</script>

</body>
</html>
